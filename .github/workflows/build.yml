name: Build Airone AI Backbone

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  validate:
    name: CI Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build renderer (webpack)
        run: npm run build:renderer

      - name: Verify build output
        run: |
          echo "=== Renderer build output ==="
          ls -la src/renderer/dist/ || echo "No dist directory found"
          if [ -f "src/renderer/dist/index.html" ]; then
            echo "✓ index.html generated"
          else
            echo "✗ index.html not found"
            exit 1
          fi

  build-windows:
    name: Windows Build
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build renderer (webpack)
        run: npm run build:renderer

      - name: Package with electron-builder (Windows NSIS)
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        shell: pwsh
        run: |
          Write-Host "=== Release directory contents ==="
          if (Test-Path "release") {
            Get-ChildItem -Path "release" -Recurse | Format-Table Name, Length -AutoSize
          } else {
            Write-Host "No release directory found"
          }

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: AironeAIBackbone-Windows-Installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          retention-days: 30
          if-no-files-found: warn
