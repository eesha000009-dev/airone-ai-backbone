services:
  # Deploy API - Always-on web service for LNN generation and deployment
  - type: web
    name: airone-deploy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn deploy_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: RENDER_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://airone-deploy.onrender.com
    healthCheckPath: /health

  # Brain Server Template - Deployed per robot with MODEL_CONFIG env var
  - type: web
    name: airone-brain-template
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python brain_server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MODEL_CONFIG
        value: "{}"
      - key: ROBOT_NAME
        value: template
      - key: RENDER_EXTERNAL_URL
        value: https://airone-brain-template.onrender.com
    healthCheckPath: /health
